<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#348CD5;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#A678F0;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Stage 1: Discover -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#348CD5" opacity="0.9"/>
    <circle cx="100" cy="40" r="20" fill="white" opacity="0.3"/>
    <text x="100" y="48" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🔍</text>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">DISCOVER</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Understand the</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">problem space</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">through research</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 250 150 L 280 150" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="280,150 270,145 270,155" fill="white"/>
  
  <!-- Stage 2: Define -->
  <g transform="translate(290, 80)">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#4A9FDD" opacity="0.9"/>
    <circle cx="100" cy="40" r="20" fill="white" opacity="0.3"/>
    <text x="100" y="48" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">🎯</text>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">DEFINE</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Identify user needs,</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">pain points, and</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">opportunities</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 500 150 L 530 150" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="530,150 520,145 520,155" fill="white"/>
  
  <!-- Stage 3: Ideate -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#7B89E1" opacity="0.9"/>
    <circle cx="100" cy="40" r="20" fill="white" opacity="0.3"/>
    <text x="100" y="48" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">💡</text>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">IDEATE</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Generate product</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">concepts and</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">prioritize features</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 750 150 L 780 150" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="780,150 770,145 770,155" fill="white"/>
  
  <!-- Stage 4: Prototype -->
  <g transform="translate(790, 80)">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#9B7FE5" opacity="0.9"/>
    <circle cx="100" cy="40" r="20" fill="white" opacity="0.3"/>
    <text x="100" y="48" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">📱</text>
    <text x="100" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">PROTOTYPE</text>
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Translate concepts</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">into interface</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">designs</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 1000 150 L 1030 150" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="1030,150 1020,145 1020,155" fill="white"/>
  
  <!-- Stage 5: Evaluate -->
  <g transform="translate(1040, 80)">
    <rect x="0" y="0" width="130" height="140" rx="12" fill="#A678F0" opacity="0.9"/>
    <circle cx="65" cy="40" r="20" fill="white" opacity="0.3"/>
    <text x="65" y="48" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">✓</text>
    <text x="65" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">EVALUATE</text>
    <text x="65" y="105" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Collect user</text>
    <text x="65" y="120" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">feedback and</text>
    <text x="65" y="135" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">iterate</text>
  </g>
</svg>
