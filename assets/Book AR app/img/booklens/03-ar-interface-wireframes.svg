<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#348CD5;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#A678F0;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">AR Interface Wireframes</text>
  
  <!-- Phone 1: Scanner -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="260" height="420" rx="25" fill="white" stroke="#348CD5" stroke-width="3"/>
    <rect x="15" y="50" width="230" height="330" rx="8" fill="#348CD5" opacity="0.05"/>
    
    <!-- Camera viewfinder -->
    <rect x="30" y="70" width="200" height="290" rx="8" fill="white" stroke="#348CD5" stroke-width="2" stroke-dasharray="8,4"/>
    
    <!-- Book -->
    <rect x="85" y="140" width="90" height="140" rx="4" fill="#348CD5" opacity="0.2" stroke="#348CD5" stroke-width="2"/>
    <text x="130" y="220" font-family="Arial, sans-serif" font-size="12" fill="#348CD5" text-anchor="middle" font-weight="bold">BOOK</text>
    <text x="130" y="235" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Cover</text>
    
    <!-- Instruction -->
    <rect x="60" y="330" width="140" height="32" rx="16" fill="#348CD5"/>
    <text x="130" y="352" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Scan Book</text>
    
    <!-- Label -->
    <text x="130" y="460" font-family="Arial, sans-serif" font-size="13" fill="#348CD5" text-anchor="middle" font-weight="bold">Step 1: Scanner</text>
    <text x="130" y="478" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Point camera at book</text>
  </g>
  
  <!-- Phone 2: AR Overlay -->
  <g transform="translate(470, 100)">
    <rect x="0" y="0" width="260" height="420" rx="25" fill="white" stroke="#7B89E1" stroke-width="3"/>
    <rect x="15" y="50" width="230" height="330" rx="8" fill="#7B89E1" opacity="0.05"/>
    
    <!-- Book in view -->
    <rect x="85" y="100" width="90" height="140" rx="4" fill="#7B89E1" opacity="0.2"/>
    
    <!-- AR Info Card -->
    <g transform="translate(30, 160)">
      <rect x="0" y="0" width="200" height="150" rx="10" fill="white" stroke="#7B89E1" stroke-width="2"/>
      <text x="100" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#222225" text-anchor="middle">The Great Gatsby</text>
      <text x="100" y="48" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">by F. Scott Fitzgerald</text>
      
      <!-- Stars -->
      <text x="100" y="75" font-family="Arial, sans-serif" font-size="18" fill="#FFD700" text-anchor="middle">★★★★</text>
      <text x="140" y="75" font-family="Arial, sans-serif" font-size="18" fill="#DDD" text-anchor="middle">★</text>
      <text x="100" y="93" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">4.2 on Goodreads</text>
      
      <!-- Button -->
      <rect x="50" y="110" width="100" height="28" rx="14" fill="#7B89E1"/>
      <text x="100" y="129" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Tap for more</text>
    </g>
    
    <!-- Label -->
    <text x="130" y="460" font-family="Arial, sans-serif" font-size="13" fill="#7B89E1" text-anchor="middle" font-weight="bold">Step 2: AR Overlay</text>
    <text x="130" y="478" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Info appears instantly</text>
  </g>
  
  <!-- Phone 3: Full Details -->
  <g transform="translate(840, 100)">
    <rect x="0" y="0" width="260" height="420" rx="25" fill="white" stroke="#A678F0" stroke-width="3"/>
    <rect x="15" y="50" width="230" height="330" rx="8" fill="white"/>
    
    <!-- Content -->
    <g transform="translate(25, 60)">
      <!-- Thumbnail -->
      <rect x="10" y="10" width="50" height="75" rx="4" fill="#A678F0" opacity="0.2"/>
      
      <!-- Info -->
      <text x="75" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">The Great Gatsby</text>
      <text x="75" y="44" font-family="Arial, sans-serif" font-size="10" fill="#666">F. Scott Fitzgerald</text>
      <text x="75" y="60" font-family="Arial, sans-serif" font-size="10" fill="#666">★ 4.2 | Fiction</text>
      
      <!-- Summary -->
      <text x="10" y="110" font-family="Arial, sans-serif" font-size="10" fill="#222225">A tale of the wealthy Jay</text>
      <text x="10" y="124" font-family="Arial, sans-serif" font-size="10" fill="#222225">Gatsby and his love for</text>
      <text x="10" y="138" font-family="Arial, sans-serif" font-size="10" fill="#222225">Daisy Buchanan...</text>
      
      <!-- Buttons -->
      <rect x="10" y="165" width="190" height="32" rx="8" fill="#A678F0" opacity="0.15" stroke="#A678F0" stroke-width="1"/>
      <text x="105" y="185" font-family="Arial, sans-serif" font-size="11" fill="#A678F0" text-anchor="middle">📖 Read Reviews</text>
      
      <rect x="10" y="205" width="190" height="32" rx="8" fill="#A678F0" opacity="0.15" stroke="#A678F0" stroke-width="1"/>
      <text x="105" y="225" font-family="Arial, sans-serif" font-size="11" fill="#A678F0" text-anchor="middle">📚 Similar Books</text>
      
      <!-- Price -->
      <text x="10" y="260" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#222225">Price:</text>
      <text x="10" y="276" font-family="Arial, sans-serif" font-size="9" fill="#666">Amazon: $12.99</text>
      <text x="10" y="290" font-family="Arial, sans-serif" font-size="9" fill="#666">Barnes &amp; Noble: $14.99</text>
    </g>
    
    <!-- Label -->
    <text x="130" y="460" font-family="Arial, sans-serif" font-size="13" fill="#A678F0" text-anchor="middle" font-weight="bold">Step 3: Full Details</text>
    <text x="130" y="478" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Reviews, recommendations, pricing</text>
  </g>
</svg>
