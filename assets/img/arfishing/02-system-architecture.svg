<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="oceanBg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#17A2B8;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#4FC3DC;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#oceanBg3)"/>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">System Architecture</text>
  
  <!-- Level 1: Hardware Input -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="80" rx="10" fill="white" stroke="#17A2B8" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="28" rx="10" fill="#17A2B8" opacity="0.15"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#17A2B8" text-anchor="middle">Hardware Layer</text>
    
    <text x="150" y="48" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">📷 Underwater Camera</text>
    <text x="150" y="68" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Mounted near fishing line</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 600 170 L 600 210" stroke="#17A2B8" stroke-width="3" fill="none" marker-end="url(#arrowTeal2)"/>
  
  <!-- Level 2: Processing -->
  <g transform="translate(450, 210)">
    <rect x="0" y="0" width="300" height="100" rx="10" fill="white" stroke="#0B7A8F" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="28" rx="10" fill="#0B7A8F" opacity="0.15"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0B7A8F" text-anchor="middle">Processing Layer</text>
    
    <text x="150" y="48" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">🧠 Computer Vision</text>
    <text x="150" y="68" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Machine learning classification</text>
    <text x="150" y="84" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Species recognition algorithm</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 600 320 L 600 360" stroke="#0B7A8F" stroke-width="3" fill="none" marker-end="url(#arrowTeal2)"/>
  
  <!-- Level 3: Display -->
  <g transform="translate(450, 360)">
    <rect x="0" y="0" width="300" height="100" rx="10" fill="white" stroke="#17A2B8" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="28" rx="10" fill="#17A2B8" opacity="0.15"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#17A2B8" text-anchor="middle">Display Layer</text>
    
    <text x="150" y="48" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">📱 AR Interface</text>
    <text x="150" y="68" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Embedded display on fishing rod</text>
    <text x="150" y="84" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Real-time AR overlays</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 600 470 L 600 510" stroke="#17A2B8" stroke-width="3" fill="none" marker-end="url(#arrowTeal2)"/>
  
  <!-- Level 4: Features (Branching) -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#222225" text-anchor="middle">Information Display</text>
  
  <!-- Feature 1 -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#17A2B8" opacity="0.08" stroke="#17A2B8" stroke-width="1.5"/>
    <text x="110" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#17A2B8" text-anchor="middle">Species Identification</text>
    <text x="110" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Name &amp; classification</text>
  </g>
  
  <!-- Feature 2 -->
  <g transform="translate(310, 520)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#0B7A8F" opacity="0.08" stroke="#0B7A8F" stroke-width="1.5"/>
    <text x="110" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0B7A8F" text-anchor="middle">Conservation Status</text>
    <text x="110" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Endangered/threatened data</text>
  </g>
  
  <!-- Feature 3 -->
  <g transform="translate(560, 520)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#4FC3DC" opacity="0.08" stroke="#4FC3DC" stroke-width="1.5"/>
    <text x="110" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4FC3DC" text-anchor="middle">Catch Recommendations</text>
    <text x="110" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Keep/release guidance</text>
  </g>
  
  <!-- Feature 4 -->
  <g transform="translate(810, 520)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#20C997" opacity="0.08" stroke="#20C997" stroke-width="1.5"/>
    <text x="110" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#20C997" text-anchor="middle">Sustainability Guidance</text>
    <text x="110" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Environmental impact info</text>
  </g>
  
  <!-- Connecting lines from Display to Features -->
  <path d="M 600 510 L 170 520" stroke="#17A2B8" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 600 510 L 420 520" stroke="#0B7A8F" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 600 510 L 670 520" stroke="#4FC3DC" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 600 510 L 920 520" stroke="#20C997" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowTeal2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17A2B8" />
    </marker>
  </defs>
</svg>
