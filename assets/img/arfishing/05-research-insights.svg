<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="oceanBg5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#17A2B8;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#4FC3DC;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="500" fill="url(#oceanBg5)"/>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">Research Insights</text>
  
  <!-- Insight 1: Overfishing Crisis -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#17A2B8" opacity="0.08" stroke="#17A2B8" stroke-width="2"/>
    
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#17A2B8" text-anchor="middle">34%</text>
    
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Global Fish Stocks</text>
    <text x="130" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Overfished</text>
    
    <text x="130" y="115" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Marine ecosystems face</text>
    <text x="130" y="132" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">critical sustainability</text>
    <text x="130" y="149" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">challenges due to</text>
    <text x="130" y="166" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">overfishing practices</text>
  </g>
  
  <!-- Insight 2: Technology Gap -->
  <g transform="translate(360, 80)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#0B7A8F" opacity="0.08" stroke="#0B7A8F" stroke-width="2"/>
    
    <text x="130" y="45" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0B7A8F" text-anchor="middle">Limited</text>
    
    <text x="130" y="75" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Real-Time Solutions</text>
    
    <text x="130" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Existing technologies require</text>
    <text x="130" y="122" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">post-processing, manual</text>
    <text x="130" y="139" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">review, or specialized</text>
    <text x="130" y="156" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">equipment—no immediate</text>
    <text x="130" y="173" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">decision support at catch</text>
  </g>
  
  <!-- Insight 3: User Needs -->
  <g transform="translate(660, 80)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#4FC3DC" opacity="0.08" stroke="#4FC3DC" stroke-width="2"/>
    
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#4FC3DC" text-anchor="middle">Critical</text>
    
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Information Timing</text>
    
    <text x="130" y="100" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Fishermen need species</text>
    <text x="130" y="117" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">identification &amp; conservation</text>
    <text x="130" y="134" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">data at the exact moment</text>
    <text x="130" y="151" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">of catch—not before</text>
    <text x="130" y="168" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">or after</text>
  </g>
  
  <!-- Insight 4: AR Opportunity -->
  <g transform="translate(960, 80)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#20C997" opacity="0.08" stroke="#20C997" stroke-width="2"/>
    
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#20C997" text-anchor="middle">AR</text>
    
    <text x="130" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Augmented Reality</text>
    <text x="130" y="88" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225" text-anchor="middle">Solution Potential</text>
    
    <text x="130" y="118" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Computer vision + AR</text>
    <text x="130" y="135" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">overlays can provide</text>
    <text x="130" y="152" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">seamless, hands-free</text>
    <text x="130" y="169" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">decision support</text>
  </g>
  
  <!-- Bottom Summary -->
  <g transform="translate(100, 300)">
    <rect x="0" y="0" width="1000" height="160" rx="12" fill="white" stroke="#17A2B8" stroke-width="2"/>
    
    <text x="500" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#17A2B8" text-anchor="middle">Key Research Finding</text>
    
    <text x="500" y="65" font-family="Arial, sans-serif" font-size="13" fill="#222225" text-anchor="middle">While monitoring technologies exist for fishing vessels and catch tracking, there is a critical gap in</text>
    <text x="500" y="85" font-family="Arial, sans-serif" font-size="13" fill="#222225" text-anchor="middle">providing real-time, contextual decision support directly to individual fishermen at the moment of catch.</text>
    
    <rect x="50" y="105" width="900" height="40" rx="6" fill="#17A2B8" opacity="0.08"/>
    <text x="500" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#17A2B8" text-anchor="middle">Design Opportunity:</text>
    <text x="500" y="140" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">AR technology can bridge this gap by embedding intelligent environmental guidance into the natural fishing workflow</text>
  </g>
</svg>
