<svg width="1200" height="650" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="oceanBg6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#17A2B8;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#4FC3DC;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="650" fill="url(#oceanBg6)"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">User Context &amp; Empathy Map</text>
  
  <!-- Persona Card (Left) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="480" height="520" rx="12" fill="white" stroke="#17A2B8" stroke-width="2"/>
    
    <!-- Avatar -->
    <circle cx="240" cy="80" r="50" fill="#17A2B8" opacity="0.15" stroke="#17A2B8" stroke-width="2"/>
    <text x="240" y="90" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">🎣</text>
    
    <!-- Name -->
    <text x="240" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#222225" text-anchor="middle">Mike Anderson</text>
    <text x="240" y="186" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Age 42 • Recreational Fisherman • Environmental Engineer</text>
    
    <!-- Goals Section -->
    <g transform="translate(40, 215)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#17A2B8" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#17A2B8">🎯 Goals</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Enjoy traditional fishing while protecting marine life</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Make informed decisions about catch &amp; release</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Support sustainable fishing practices</text>
    </g>
    
    <!-- Frustrations Section -->
    <g transform="translate(40, 315)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#0B7A8F" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0B7A8F">😤 Frustrations</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Uncertain about species identification</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Lacks access to real-time conservation data</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Worries about accidentally catching endangered species</text>
    </g>
    
    <!-- Behaviors Section -->
    <g transform="translate(40, 415)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#4FC3DC" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4FC3DC">📊 Behaviors</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Fishes locally on weekends for relaxation</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Follows catch &amp; release when uncertain about species</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Researches fishing regulations but lacks field tools</text>
    </g>
  </g>
  
  <!-- Empathy Map (Right) -->
  <g transform="translate(600, 80)">
    <rect x="0" y="0" width="540" height="520" rx="12" fill="white" stroke="#20C997" stroke-width="2"/>
    
    <!-- Center circle -->
    <circle cx="270" cy="260" r="65" fill="#20C997" opacity="0.1" stroke="#20C997" stroke-width="2"/>
    <text x="270" y="255" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Mike's</text>
    <text x="270" y="272" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Experience</text>
    
    <!-- Thinks (Top Left) -->
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#17A2B8" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#17A2B8" text-anchor="middle">💭 THINKS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">"Is this species</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">endangered?"</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">"I want to fish</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">responsibly"</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">"Wish I had data</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">in real-time"</text>
    </g>
    
    <!-- Feels (Top Right) -->
    <g transform="translate(290, 30)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#0B7A8F" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0B7A8F" text-anchor="middle">❤️ FEELS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">Conflicted between</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">hobby &amp; conservation</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">Anxious about</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">making wrong choice</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">Relaxed when fishing</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">in peaceful nature</text>
    </g>
    
    <!-- Says (Bottom Left) -->
    <g transform="translate(30, 325)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#4FC3DC" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4FC3DC" text-anchor="middle">💬 SAYS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">"I want to protect</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">fish populations for</text>
      <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#222225">future generations"</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">"We need better tools</text>
      <text x="10" y="115" font-family="Arial, sans-serif" font-size="11" fill="#222225">for sustainable fishing"</text>
    </g>
    
    <!-- Does (Bottom Right) -->
    <g transform="translate(290, 325)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#20C997" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#20C997" text-anchor="middle">✋ DOES</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">Checks regulations</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">before trips</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">Releases uncertain</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">catches by default</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">Wishes for instant</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">species information</text>
    </g>
  </g>
</svg>
