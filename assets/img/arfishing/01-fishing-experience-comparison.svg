<svg width="1200" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="oceanBg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#17A2B8;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#4FC3DC;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="550" fill="url(#oceanBg2)"/>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">Fishing Experience Comparison</text>
  
  <!-- Traditional Fishing (Left) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="540" height="420" rx="12" fill="white" stroke="#17A2B8" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="540" height="50" rx="12" fill="#17A2B8" opacity="0.15"/>
    <text x="270" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#17A2B8" text-anchor="middle">Traditional Fishing</text>
    
    <!-- Steps -->
    <g transform="translate(30, 80)">
      <!-- Step 1 -->
      <circle cx="0" cy="0" r="25" fill="#17A2B8" opacity="0.15" stroke="#17A2B8" stroke-width="2"/>
      <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#17A2B8" text-anchor="middle">1</text>
      <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Fish appears on line</text>
      
      <!-- Arrow -->
      <path d="M 12 40 L 12 75" stroke="#17A2B8" stroke-width="2" fill="none" marker-end="url(#arrowOcean)"/>
      
      <!-- Step 2 -->
      <g transform="translate(0, 90)">
        <circle cx="0" cy="0" r="25" fill="#0B7A8F" opacity="0.15" stroke="#0B7A8F" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B7A8F" text-anchor="middle">2</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Rely on personal knowledge</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">Limited to own experience</text>
      </g>
      
      <!-- Arrow -->
      <path d="M 12 130 L 12 165" stroke="#0B7A8F" stroke-width="2" fill="none" marker-end="url(#arrowOcean)"/>
      
      <!-- Step 3 -->
      <g transform="translate(0, 180)">
        <circle cx="0" cy="0" r="25" fill="#17A2B8" opacity="0.15" stroke="#17A2B8" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#17A2B8" text-anchor="middle">3</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Uncertain species identification</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">Guessing conservation status</text>
      </g>
      
      <!-- Arrow -->
      <path d="M 12 220 L 12 255" stroke="#17A2B8" stroke-width="2" fill="none" marker-end="url(#arrowOcean)"/>
      
      <!-- Step 4 -->
      <g transform="translate(0, 270)">
        <circle cx="0" cy="0" r="25" fill="#0B7A8F" opacity="0.15" stroke="#0B7A8F" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0B7A8F" text-anchor="middle">4</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Make decision without data</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">Risk of catching endangered species</text>
      </g>
    </g>
  </g>
  
  <!-- AR-Assisted Fishing (Right) -->
  <g transform="translate(620, 80)">
    <rect x="0" y="0" width="540" height="420" rx="12" fill="white" stroke="#20C997" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="540" height="50" rx="12" fill="#20C997" opacity="0.15"/>
    <text x="270" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#20C997" text-anchor="middle">AR-Assisted Fishing</text>
    
    <!-- Steps -->
    <g transform="translate(30, 80)">
      <!-- Step 1 -->
      <circle cx="0" cy="0" r="25" fill="#20C997" opacity="0.15" stroke="#20C997" stroke-width="2"/>
      <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#20C997" text-anchor="middle">1</text>
      <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Fish detected by camera</text>
      
      <!-- Arrow -->
      <path d="M 12 40 L 12 75" stroke="#20C997" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      
      <!-- Step 2 -->
      <g transform="translate(0, 90)">
        <circle cx="0" cy="0" r="25" fill="#4FC3DC" opacity="0.15" stroke="#4FC3DC" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4FC3DC" text-anchor="middle">2</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Instant species identification</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">Computer vision provides real-time ID</text>
      </g>
      
      <!-- Arrow -->
      <path d="M 12 130 L 12 165" stroke="#4FC3DC" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      
      <!-- Step 3 -->
      <g transform="translate(0, 180)">
        <circle cx="0" cy="0" r="25" fill="#20C997" opacity="0.15" stroke="#20C997" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#20C997" text-anchor="middle">3</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">View conservation status &amp; data</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">AR overlay shows sustainability info</text>
      </g>
      
      <!-- Arrow -->
      <path d="M 12 220 L 12 255" stroke="#20C997" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
      
      <!-- Step 4 -->
      <g transform="translate(0, 270)">
        <circle cx="0" cy="0" r="25" fill="#4FC3DC" opacity="0.2" stroke="#4FC3DC" stroke-width="2"/>
        <text x="0" y="6" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4FC3DC" text-anchor="middle">4</text>
        <text x="50" y="6" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#222225">Make informed sustainable choice</text>
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" fill="#666">Data-driven conservation decisions</text>
      </g>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOcean" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17A2B8" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#20C997" />
    </marker>
  </defs>
</svg>
