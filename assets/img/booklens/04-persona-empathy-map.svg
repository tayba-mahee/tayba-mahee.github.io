<svg width="1200" height="650" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#348CD5;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#A678F0;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="650" fill="url(#bgGrad3)"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#222225" text-anchor="middle">User Persona &amp; Empathy Map</text>
  
  <!-- Persona Card (Left) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="480" height="520" rx="12" fill="white" stroke="#348CD5" stroke-width="2"/>
    
    <!-- Avatar -->
    <circle cx="240" cy="80" r="50" fill="#348CD5" opacity="0.15" stroke="#348CD5" stroke-width="2"/>
    <text x="240" y="90" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">👤</text>
    
    <!-- Name -->
    <text x="240" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#222225" text-anchor="middle">Sarah Chen</text>
    <text x="240" y="186" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Age 28 • Avid Reader • Marketing Manager</text>
    
    <!-- Goals Section -->
    <g transform="translate(40, 215)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#348CD5" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#348CD5">🎯 Goals</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Discover quality books quickly without extensive research</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Trust recommendations from real readers</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Make informed purchase decisions efficiently</text>
    </g>
    
    <!-- Frustrations Section -->
    <g transform="translate(40, 315)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#7B89E1" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7B89E1">😤 Frustrations</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Spends too much time researching each book</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Context switching between apps ruins browsing flow</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Information overload from multiple sources</text>
    </g>
    
    <!-- Behaviors Section -->
    <g transform="translate(40, 415)">
      <rect x="0" y="0" width="400" height="85" rx="8" fill="#A678F0" opacity="0.08"/>
      <text x="10" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#A678F0">📊 Behaviors</text>
      <text x="10" y="42" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Visits bookstores weekly for inspiration</text>
      <text x="10" y="58" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Always checks Goodreads before purchasing</text>
      <text x="10" y="74" font-family="Arial, sans-serif" font-size="12" fill="#222225">• Values peer reviews over professional critics</text>
    </g>
  </g>
  
  <!-- Empathy Map (Right) -->
  <g transform="translate(600, 80)">
    <rect x="0" y="0" width="540" height="520" rx="12" fill="white" stroke="#A678F0" stroke-width="2"/>
    
    <!-- Center circle -->
    <circle cx="270" cy="260" r="65" fill="#A678F0" opacity="0.1" stroke="#A678F0" stroke-width="2"/>
    <text x="270" y="255" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Sarah's</text>
    <text x="270" y="272" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Experience</text>
    
    <!-- Thinks (Top Left) -->
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#348CD5" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#348CD5" text-anchor="middle">💭 THINKS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">"Is this book worth</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">my time?"</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">"What do other</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">readers think?"</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">"I wish deciding was</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">faster"</text>
    </g>
    
    <!-- Feels (Top Right) -->
    <g transform="translate(290, 30)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#7B89E1" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7B89E1" text-anchor="middle">❤️ FEELS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">Frustrated leaving</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">store experience</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">Excited discovering</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">new books</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">Overwhelmed by</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">too many options</text>
    </g>
    
    <!-- Says (Bottom Left) -->
    <g transform="translate(30, 325)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#9B7FE5" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9B7FE5" text-anchor="middle">💬 SAYS</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">"I wish I could get</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">reviews without pulling</text>
      <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#222225">out my phone"</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">"Browsing should be</text>
      <text x="10" y="115" font-family="Arial, sans-serif" font-size="11" fill="#222225">relaxing, not stressful"</text>
    </g>
    
    <!-- Does (Bottom Right) -->
    <g transform="translate(290, 325)">
      <rect x="0" y="0" width="220" height="165" rx="8" fill="#A678F0" opacity="0.08"/>
      <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#A678F0" text-anchor="middle">✋ DOES</text>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#222225">Searches multiple</text>
      <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#222225">apps for information</text>
      <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#222225">Reads lengthy</text>
      <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#222225">online reviews</text>
      <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#222225">Compares options</text>
      <text x="10" y="140" font-family="Arial, sans-serif" font-size="11" fill="#222225">across platforms</text>
    </g>
  </g>
</svg>
