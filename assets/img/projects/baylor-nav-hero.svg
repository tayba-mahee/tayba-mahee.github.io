<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Baylor Navigation Hero -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#154734;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB81C;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Map Grid Background -->
  <g opacity="0.1">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="800" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="800" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Buildings (Simplified) -->
  <g transform="translate(200, 300)" opacity="0.3">
    <rect x="0" y="0" width="100" height="120" fill="white" opacity="0.8"/>
    <rect x="10" y="10" width="20" height="20" fill="#154734"/>
    <rect x="40" y="10" width="20" height="20" fill="#154734"/>
    <rect x="70" y="10" width="20" height="20" fill="#154734"/>
    <rect x="10" y="40" width="20" height="20" fill="#154734"/>
    <rect x="40" y="40" width="20" height="20" fill="#154734"/>
    <rect x="70" y="40" width="20" height="20" fill="#154734"/>
  </g>
  
  <g transform="translate(400, 250)" opacity="0.3">
    <rect x="0" y="0" width="120" height="150" fill="white" opacity="0.8"/>
    <rect x="10" y="10" width="25" height="25" fill="#154734"/>
    <rect x="45" y="10" width="25" height="25" fill="#154734"/>
    <rect x="80" y="10" width="25" height="25" fill="#154734"/>
  </g>
  
  <g transform="translate(700, 320)" opacity="0.3">
    <rect x="0" y="0" width="90" height="100" fill="white" opacity="0.8"/>
    <rect x="10" y="10" width="15" height="15" fill="#154734"/>
    <rect x="35" y="10" width="15" height="15" fill="#154734"/>
    <rect x="60" y="10" width="15" height="15" fill="#154734"/>
  </g>
  
  <!-- Map Pin/Location Markers -->
  <g transform="translate(350, 200)">
    <circle cx="0" cy="20" r="3" fill="#FFB81C" opacity="0.3"/>
    <path d="M 0,-20 C -15,-20 -25,-10 -25,5 C -25,20 0,40 0,40 C 0,40 25,20 25,5 C 25,-10 15,-20 0,-20 Z" fill="#FFB81C"/>
    <circle cx="0" cy="5" r="8" fill="white"/>
  </g>
  
  <g transform="translate(650, 380)">
    <circle cx="0" cy="15" r="2" fill="#FFB81C" opacity="0.2"/>
    <path d="M 0,-15 C -10,-15 -18,-7 -18,3 C -18,15 0,30 0,30 C 0,30 18,15 18,3 C 18,-7 10,-15 0,-15 Z" fill="rgba(255,184,28,0.7)"/>
    <circle cx="0" cy="3" r="5" fill="white"/>
  </g>
  
  <!-- Navigation Route Line -->
  <path d="M 350 220 Q 500 300 650 400" fill="none" stroke="#FFB81C" stroke-width="4" stroke-dasharray="10,10" opacity="0.8"/>
  
  <!-- Mobile Device Frame -->
  <g transform="translate(800, 150)">
    <rect x="0" y="0" width="280" height="500" rx="30" fill="#1a1a1a"/>
    <rect x="10" y="10" width="260" height="480" rx="20" fill="#2a2a2a"/>
    <!-- Screen -->
    <rect x="20" y="50" width="240" height="420" rx="10" fill="white"/>
    <!-- Map on screen -->
    <rect x="20" y="50" width="240" height="420" rx="10" fill="url(#bgGrad)" opacity="0.3"/>
    <!-- Location marker on screen -->
    <circle cx="140" cy="260" r="8" fill="#FFB81C"/>
    <circle cx="140" cy="260" r="4" fill="white"/>
    <!-- Button -->
    <rect x="70" y="400" width="140" height="40" rx="20" fill="#154734"/>
    <text x="140" y="427" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Navigate</text>
  </g>
  
  <!-- React/Tech Icons (subtle) -->
  <g transform="translate(100, 600)" opacity="0.2">
    <!-- React icon simplified -->
    <ellipse cx="50" cy="50" rx="60" ry="25" fill="none" stroke="white" stroke-width="2"/>
    <ellipse cx="50" cy="50" rx="60" ry="25" fill="none" stroke="white" stroke-width="2" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="50" rx="60" ry="25" fill="none" stroke="white" stroke-width="2" transform="rotate(120 50 50)"/>
    <circle cx="50" cy="50" r="8" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="750" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Campus Navigation System</text>
</svg>
