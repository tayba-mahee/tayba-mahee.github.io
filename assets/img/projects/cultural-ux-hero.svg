<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Cultural UX Research Hero -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Global/Cultural Symbols -->
  <g opacity="0.15">
    <!-- Globe wireframe -->
    <circle cx="300" cy="400" r="180" fill="none" stroke="white" stroke-width="2"/>
    <ellipse cx="300" cy="400" rx="180" ry="60" fill="none" stroke="white" stroke-width="2"/>
    <ellipse cx="300" cy="400" rx="60" ry="180" fill="none" stroke="white" stroke-width="2"/>
    <line x1="300" y1="220" x2="300" y2="580" stroke="white" stroke-width="2"/>
    <line x1="120" y1="400" x2="480" y2="400" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Browser Windows (Different Cultures) -->
  <g transform="translate(600, 200)">
    <!-- Window 1 -->
    <rect x="0" y="0" width="250" height="180" rx="8" fill="rgba(255,255,255,0.95)"/>
    <rect x="0" y="0" width="250" height="30" rx="8" fill="rgba(255,255,255,0.5)"/>
    <circle cx="15" cy="15" r="5" fill="#FF5F56"/>
    <circle cx="35" cy="15" r="5" fill="#FFBD2E"/>
    <circle cx="55" cy="15" r="5" fill="#27C93F"/>
    <!-- Content lines -->
    <rect x="20" y="50" width="160" height="8" rx="4" fill="#667eea" opacity="0.6"/>
    <rect x="20" y="70" width="210" height="6" rx="3" fill="#667eea" opacity="0.3"/>
    <rect x="20" y="85" width="190" height="6" rx="3" fill="#667eea" opacity="0.3"/>
    <rect x="20" y="110" width="100" height="25" rx="4" fill="#667eea" opacity="0.4"/>
  </g>
  
  <g transform="translate(300, 450)">
    <!-- Window 2 (Different layout) -->
    <rect x="0" y="0" width="250" height="180" rx="8" fill="rgba(255,255,255,0.85)"/>
    <rect x="0" y="0" width="250" height="30" rx="8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="15" cy="15" r="5" fill="#FF5F56"/>
    <circle cx="35" cy="15" r="5" fill="#FFBD2E"/>
    <circle cx="55" cy="15" r="5" fill="#27C93F"/>
    <!-- Different content layout -->
    <rect x="180" y="50" width="50" height="50" rx="4" fill="#764ba2" opacity="0.5"/>
    <rect x="20" y="50" width="140" height="8" rx="4" fill="#764ba2" opacity="0.6"/>
    <rect x="20" y="70" width="120" height="6" rx="3" fill="#764ba2" opacity="0.3"/>
    <rect x="20" y="120" width="80" height="25" rx="4" fill="#764ba2" opacity="0.4"/>
  </g>
  
  <!-- User Icons -->
  <g transform="translate(850, 350)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="-5" r="12" fill="white" opacity="0.8"/>
    <ellipse cx="0" cy="15" rx="20" ry="12" fill="white" opacity="0.8"/>
  </g>
  
  <g transform="translate(950, 500)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.2)"/>
    <circle cx="0" cy="-5" r="12" fill="white" opacity="0.8"/>
    <ellipse cx="0" cy="15" rx="20" ry="12" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Data/Analytics Elements -->
  <g transform="translate(100, 150)" opacity="0.3">
    <line x1="0" y1="100" x2="150" y2="100" stroke="white" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="white" stroke-width="2"/>
    <polyline points="0,80 30,60 60,70 90,40 120,50 150,30" fill="none" stroke="white" stroke-width="3"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="720" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Cross-Cultural UX Research</text>
</svg>
